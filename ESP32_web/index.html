<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACC - Controle Individual PMV</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>SACC <strong>LOGIN</strong></h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha" style="margin-top:10px">
        <button id="btnLogin" class="btn" onclick="logar()">ENTRAR</button>
        <div id="loginStatus" style="font-size:12px;margin-top:10px;color:#888;min-height:18px;"></div>
    </div>
</div>

<div id="top-header"><span class="top-header-pmv">PMV</span><span class="top-header-config">CONFIGURAÇÕES</span></div>

<div id="map"></div>

<div id="control-panel">
    <button class="close-btn" onclick="fecharPainel()">×</button>
    <div class="panel-header">
        <span class="panel-header-title">PMV</span>
        <span class="panel-header-sub">Configurações</span>
    </div>

    <div class="status-card" style="margin-top: 20px;">
        <div class="semaforo-visual">
            <div id="ledRed" class="luz luz-red"></div>
            <div id="ledGreen" class="luz luz-green"></div>
        </div>
        <div>
            <div id="devName" style="font-size: 10px; opacity: 0.7;">Buscando hardware...</div>
            <div id="statusTxt" style="font-weight: bold; font-size: 14px;">AGUARDANDO...</div>
            <span id="connStatus" class="offline-text">● OFFLINE</span>
        </div>
    </div>

    <div class="section-title">Preview Individual</div>
    <div id="preview-container">
        <!-- Canvas: 120 LEDs largura x 40 LEDs altura = proporção 3:1, renderizado 4px/LED -->
        <canvas id="p10Canvas" width="576" height="240"></canvas>
    </div>

    <div class="section-title">Configuração por Fase:</div>
    <div class="grid" style="margin-top:10px;">
        <div id="selectRed" class="state-btn" onclick="setEditingPhase('red')">FASE VERMELHA</div>
        <div id="selectGreen" class="state-btn" onclick="setEditingPhase('green')">FASE VERDE</div>
    </div>

    <label>Mensagens (Enter = nova tela no Slide / segunda linha no Fixo)</label>
    <textarea id="msgInput" rows="5" oninput="limitarTexto()" placeholder="Texto..."></textarea>
    <div id="charInfo" style="font-size:10px;color:#888;text-align:right;margin-top:2px;"></div>

    <div class="grid">
        <div>
            <label>Modo</label>
            <select id="modoExibicao" onchange="updateMemory(); limitarTexto()">
                <option value="fixed">Fixo (Estático)</option>
                <option value="slide">Slide (Troca)</option>
                <option value="scroll">Scroll (Corrido)</option>
            </select>
        </div>
        <div>
            <label>Tamanho</label>
            <select id="fSize" onchange="updateMemory(); limitarTexto()">
                <option value="2" selected>Médio</option>
                <option value="3">Grande</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label>Alinhamento H</label>
            <select id="align" onchange="updateMemory(); limitarTexto()">
                <option value="left">Esquerda</option>
                <option value="center">Centro</option>
            </select>
        </div>
        <div>
            <label>Posição V</label>
            <select id="valign" onchange="updateMemory(); limitarTexto()">
                <option value="top">Topo</option>
                <option value="center" selected>Centro</option>
                <option value="bottom">Rodapé</option>
            </select>
        </div>
    </div>

    <div>
        <label>Cor do Texto</label>
        <div class="color-picker" id="tColorPicker"></div>
        <input type="hidden" id="tColor" value="#ffff00">
    </div>

    <div style="margin-top:10px;">
        <label>Cor do Fundo</label>
        <div class="color-picker" id="bgColorPicker"></div>
        <input type="hidden" id="bgColor" value="#000000">
    </div>

    <button id="btnSalvar" class="btn" onclick="enviarMQTT()" disabled>AGUARDANDO SELEÇÃO</button>
</div>

<script src="script.js"></script>
</body>
</html>
