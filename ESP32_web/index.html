<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACC - Controle Individual PMV</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>SACC <strong>LOGIN</strong></h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha" style="margin-top:10px">
        <button id="btnLogin" class="btn" onclick="logar()">ENTRAR</button>
    </div>
</div>

<div id="map"></div>

<div id="control-panel">
    <button class="close-btn" onclick="fecharPainel()">×</button>
    
    <div class="status-card" style="margin-top: 20px;">
        <div class="semaforo-visual">
            <div id="ledRed" class="luz luz-red"></div>
            <div id="ledGreen" class="luz luz-green"></div>
        </div>
        <div>
            <div id="devName" style="font-size: 10px; opacity: 0.7;">Buscando hardware...</div>
            <div id="statusTxt" style="font-weight: bold; font-size: 14px;">AGUARDANDO...</div>
            <span id="connStatus" class="offline-text">● OFFLINE</span>
        </div>
    </div>

    <div class="section-title">Preview Individual</div>
    <div id="preview-container">
        <canvas id="p10Canvas" width="400" height="200"></canvas>
    </div>

    <div class="section-title">Configuração por Fase:</div>
    <div class="grid" style="margin-top:10px;">
        <div id="selectRed" class="state-btn" onclick="setEditingPhase('red')">FASE VERMELHA</div>
        <div id="selectGreen" class="state-btn" onclick="setEditingPhase('green')">FASE VERDE</div>
    </div>

    <label>Mensagens (Enter para trocar de tela no Slide)</label>
    <textarea id="msgInput" rows="4" oninput="updateMemory()" placeholder="Texto..."></textarea>

    <div class="grid">
        <div>
            <label>Modo</label>
            <select id="modoExibicao" onchange="updateMemory()">
                <option value="fixed">Fixo (Estático)</option>
                <option value="slide">Slide (Troca)</option>
                <option value="scroll">Scroll (Corrido)</option>
            </select>
        </div>
        <div>
            <label>Tamanho</label>
            <select id="fSize" onchange="updateMemory()">
                <option value="1">Pequeno</option>
                <option value="2" selected>Médio</option>
                <option value="3">Grande</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label>Cor Texto</label>
            <input type="color" id="tColor" value="#ffff00" onchange="updateMemory()">
        </div>
        <div>
            <label>Cor Fundo</label>
            <input type="color" id="bgColor" value="#000000" onchange="updateMemory()">
        </div>
    </div>

    <button id="btnSalvar" class="btn" onclick="enviarMQTT()" disabled>AGUARDANDO SELEÇÃO</button>
</div>

<script src="script.js"></script>
</body>
</html>
